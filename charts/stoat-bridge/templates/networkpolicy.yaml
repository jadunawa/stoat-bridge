{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stoat-bridge.fullname" . }}
  labels:
    {{- include "stoat-bridge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "stoat-bridge.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - port: {{ .Values.config.port }}
          protocol: TCP
{{- end }}
