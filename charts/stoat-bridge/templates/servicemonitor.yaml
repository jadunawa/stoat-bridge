{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "stoat-bridge.fullname" . }}
  labels:
    {{- include "stoat-bridge.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "stoat-bridge.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
{{- end }}
