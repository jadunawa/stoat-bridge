replicaCount: 1

image:
  repository: ghcr.io/jadunawa/stoat-bridge
  tag: ""  # defaults to chart appVersion
  pullPolicy: IfNotPresent

config:
  port: 8080
  logLevel: info
  queueSize: 100
  maxRetries: 3
  shutdownTimeout: "10s"
  maxBodySize: 1048576
  maxMessageLength: 1900
  rateLimit: 100
  stoatApiUrl: "https://api.stoat.chat"

existingSecret: ""  # Name of existing Secret with STOAT_BOT_TOKEN, channel IDs, WEBHOOK_SECRET

serviceMonitor:
  enabled: true
  interval: 30s

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

networkPolicy:
  enabled: false
  allowedNamespaces: []

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
